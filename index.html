<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>夏天这么热，你要给我买冰淇淋🍦吗？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background: #f6f6f6;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
  overflow: hidden;
}

/* 背景爱心漂浮 */
.hearts {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.heart {
  position: absolute;
  font-size: 22px;
  opacity: 0;
  animation: floatUp 7s ease-in-out infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  15%  { opacity: 0.35; }
  75%  { opacity: 0.35; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* 主内容区 */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  width: 100%;
  padding: 20px;
}

/* 冰淇淋图标 */
.ice-icon {
  font-size: 72px;
  margin-bottom: 8px;
  display: block;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 标题 */
.main-title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  text-shadow: 1px 2px 8px rgba(0,0,0,0.12);
  line-height: 1.4;
  margin-bottom: 6px;
}

.sub-title {
  font-size: 15px;
  color: rgba(255,255,255,0.8);
  text-shadow: 1px 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 28px;
}

/* 按钮容器 */
.btn-area {
  position: relative;
  height: 220px;
  width: 100%;
  max-width: 360px;
  margin: 0 auto;
}

/* 接受按钮 - 接受会不断变大 */
.btn-yes {
  position: absolute;
  padding: 14px 56px;
  font-size: 19px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(238,90,36,0.3);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  -webkit-appearance: none;
  z-index: 20;
  white-space: nowrap;
  /* 居中 */
  left: 50%;
  top: 45%;
  transform: translate(-50%, -50%) scale(1);
}

.btn-yes:active {
  transform: translate(-50%, -50%) scale(0.96);
}

/* 拒绝按钮 - 拒绝会不断变小并乱跑 */
.btn-no {
  position: absolute;
  padding: 12px 36px;
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  -webkit-tap-highlight-color: transparent;
  outline: none;
  -webkit-appearance: none;
  z-index: 15;
  white-space: nowrap;
  /* 初始在右下角，离接受远远的 */
  right: 10px;
  bottom: 10px;
  left: auto;
  top: auto;
  transform: scale(1);
}

.btn-no:active {
  opacity: 0.6;
}

/* 底部小字 */
.footer-text {
  position: fixed;
  bottom: 16px;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  z-index: 1;
  pointer-events: none;
}

/* ===== 收款码弹窗 ===== */
.qr-overlay {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  align-items: center;
  justify-content: center;
  padding: 28px;
}

.qr-overlay.active {
  display: flex;
}

.qr-box {
  background: #fff;
  border-radius: 18px;
  padding: 28px 22px 22px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  animation: popUp 0.35s ease-out;
  box-shadow: 0 16px 48px rgba(0,0,0,0.35);
}

@keyframes popUp {
  0%   { transform: scale(0.5) translateY(30px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

.qr-box .qr-label {
  font-size: 16px;
  font-weight: 700;
  color: #222;
  margin-bottom: 3px;
}

.qr-box .qr-hint {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 14px;
}

.qr-box .qr-code {
  width: 260px;
  height: 260px;
  margin: 0 auto 14px;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  border: 1px solid #f0f0f0;
}

.qr-box .qr-code img {
  width: 100%;
  height: 100%;
  display: block;
}

.qr-box .qr-close {
  display: inline-block;
  padding: 9px 38px;
  font-size: 14px;
  color: #666;
  background: #f5f5f5;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  -webkit-appearance: none;
  outline: none;
}

.qr-box .qr-close:active {
  background: #e8e8e8;
}

/* 隐藏的音频元素 */
#bgMusic {
  display: none;
}
</style>
</head>

    <div class="btn-area" id="btnArea">

      <button class="btn-no" id="btnNo">拒绝</button>

(function() {
  'use strict';
  
  // ====== 生成背景爱心 ======
  var hc = document.getElementById('heartContainer');
  var hearts = ['💖', '💗', '💕', '❤️', '💓'];
  for (var i = 0; i < 14; i++) {
    var el = document.createElement('div');
    el.className = 'heart';
    el.textContent = hearts[i % hearts.length];
    el.style.left = (Math.random() * 94 + 3) + '%';
    el.style.animationDuration = (Math.random() * 4 + 5) + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    el.style.fontSize = (Math.random() * 14 + 16) + 'px';
    hc.appendChild(el);
  }
  
  // ====== 元素 ======
  var btnYes = document.getElementById('btnYes');
  var btnNo = document.getElementById('btnNo');
  var btnArea = document.getElementById('btnArea');
  var qrOverlay = document.getElementById('qrOverlay');
  var qrClose = document.getElementById('qrCloseBtn');
  var music = document.getElementById('bgMusic');
  
  // ====== 状态 ======
  var clickCount = 0;        // 拒绝次数
  var accepted = false;      // 是否已接受
  var scaleYes = 1;          // 接受按钮缩放
  var scaleNo = 1;           // 拒绝按钮缩放
  var musicStarted = false;  // 音乐是否已触发
  
  // ====== 音乐源（原版音乐） ======
  var musicUrl = 'https://hw.a.yximgs.com/bs2/ost/MTM4Njc4OTgxMjc1XzMzNzE3MTM1NjM.m4a';
  
  // ====== 工具：随机数 ======
  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }
  
  // ====== 获取按钮区域尺寸 ======
  function getBtnAreaBounds() {
    var rect = btnArea.getBoundingClientRect();
    return {
      w: rect.width,
      h: rect.height,
      left: rect.left,
      top: rect.top
    };
  }
  
  // ====== 点击拒绝 ======
  function handleNo(e) {
    if (accepted) return;
    e.preventDefault();
    e.stopPropagation();
    
    clickCount++;
    
    // 接受按钮变大
    scaleYes = 1 + clickCount * 0.18;
    // 拒绝按钮变小
    scaleNo = Math.max(0.2, 1 - clickCount * 0.15);
    
    // 更新接受按钮样式
    btnYes.style.transform = 'translate(-50%, -50%) scale(' + scaleYes + ')';
    btnYes.style.boxShadow = '0 ' + (6 + clickCount * 4) + 'px ' + (20 + clickCount * 6) + 'px rgba(238,90,36,' + (0.3 + clickCount * 0.05) + ')';
    
    // 拒绝按钮随机换位（在按钮区域内安全范围）
    var area = getBtnAreaBounds();
    var btnW = 60 * scaleNo + 40;   // 按钮宽度估算
    var btnH = 44 * scaleNo;        // 按钮高度估算
    
    // 计算安全范围（避免跑出按钮区域）
    var margin = 10;
    var maxX = area.w - btnW - margin;
    var maxY = area.h - btnH - margin;
    var minX = margin;
    var minY = margin;
    
    // 如果是第一次拒绝，左边放；后面随机
    var newX, newY;
    if (clickCount === 1) {
      // 第一次拒绝：往左上方跑
      newX = margin + 5;
      newY = margin + 5;
    } else {
      newX = rand(minX, Math.max(minX + 10, maxX));
      newY = rand(minY, Math.max(minY + 10, maxY));
    }
    
    // 但不要让拒绝按钮遮挡接受按钮的中心区域
    // 避免重叠：检查是否覆盖接受按钮
    // 简单策略：如果随机位置太靠近中心，重新随机
    var centerX = area.w / 2;
    var centerY = area.h / 2;
    var safeRadius = 50 * scaleYes;
    
    for (var attempt = 0; attempt < 20; attempt++) {
      var dx = newX + btnW/2 - centerX;
      var dy = newY + btnH/2 - centerY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > safeRadius) break;
      newX = rand(minX, Math.max(minX + 10, maxX));
      newY = rand(minY, Math.max(minY + 10, maxY));
    }
    
    btnNo.style.left = newX + 'px';
    btnNo.style.top = newY + 'px';
    btnNo.style.transform = 'scale(' + scaleNo + ')';
    
    // 如果拒绝按钮变得很小，降低透明度
    if (scaleNo < 0.4) {
      btnNo.style.opacity = Math.max(0.15, scaleNo);
    }
    
    // 加一点震动反馈（手机触感）
    if (navigator.vibrate) {
      navigator.vibrate(10);
    }
  }
  
  // ====== 播放音乐 ======
  function playMusic() {
    if (musicStarted) return;
    musicStarted = true;
    
    // 设置音乐源
    music.src = musicUrl;
    music.loop = true;
    
    // 尝试播放
    var playPromise = music.play();
    if (playPromise && playPromise.catch) {
      playPromise.catch(function() {
        // 微信浏览器可能需要用户交互后才能播放
        // 这里接受按钮本身就是用户交互，应该能播放
      });
    }
  }
  
  // ====== 点击接受 ======
  function handleYes(e) {
    if (accepted) return;
    e.preventDefault();
    accepted = true;
    
    // 播放音乐
    playMusic();
    
    // 弹出收款码
    qrOverlay.classList.add('active');
  }
  
  // ====== 关闭收款码 ======
  function closeQR() {
    qrOverlay.classList.remove('active');
  }
  
  // ====== 绑定事件 ======
  btnYes.addEventListener('click', handleYes);
  btnYes.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleYes(e);
  });
  
  btnNo.addEventListener('click', handleNo);
  btnNo.addEventListener('touchend', function(e) {
    e.preventDefault();
    handleNo(e);
  });
  
  qrClose.addEventListener('click', closeQR);
  qrClose.addEventListener('touchend', function(e) {
    e.preventDefault();
    closeQR();
  });
  
  // 点击弹窗背景关闭
  qrOverlay.addEventListener('click', function(e) {
    if (e.target === qrOverlay) {
      closeQR();
    }
  });
  
  // ====== 窗口改变时，确保拒绝按钮还在区域内 ======
  window.addEventListener('resize', function() {
    if (accepted || clickCount === 0) return;
    // 简单处理：不强制调整位置，用户刷新即可
  });
  
})();
</script>
</body>
</html>
